<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Redirecting you in <span id="timer">3</span>...</h1>
        <p>If you are not redirected, <a href="https://www.profitablecpmratenetwork.com/k3wwrs2aye?key=9f3816b7ae0f1ecf439d66669b8a604f">click here</a>.</p>
    </div>

    <script>
        let timeLeft = 3;
        const timerElement = document.getElementById('timer');
        const targetUrl = "https://www.profitablecpmratenetwork.com/k3wwrs2aye?key=9f3816b7ae0f1ecf439d66669b8a604f";

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>

</body>
</html>
